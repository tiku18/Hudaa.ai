<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hudaa – Islamic AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* 🎨 UI DESIGN - NO CHANGES MADE AS REQUESTED */
:root{
  --g9:#0d3320;--g8:#155233;--g7:#1a6640;--g6:#1f7a4d;--g5:#2a9d6b;--g4:#3dbf85;--g3:#6ddba8;--g1:#e6f7ef;--g0:#f2fbf6;
  --gold:#c9a84c;--white:#fff;--bg:#fafcfb;
  --t1:#1a241a;--t2:#4a5c4a;--gr4:#9aa49a;--gr2:#dde0dd;--gr1:#eef0ee;
  --sh1:0 1px 4px rgba(13,51,32,.09);--sh2:0 4px 18px rgba(13,51,32,.13);--sh3:0 8px 36px rgba(13,51,32,.18);
  --fs:'Playfair Display',serif;--fb:'Lora',serif;--fa:'Noto Naskh Arabic',serif;
  --nb:62px;--sw:300px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#ov{display:none;position:fixed;inset:0;background:rgba(13,51,32,.42);backdrop-filter:blur(3px);z-index:100}
#ov.on{display:block}
#sb{position:fixed;top:0;left:0;bottom:0;width:var(--sw);background:var(--g9);z-index:200;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .32s cubic-bezier(.4,0,.2,1);box-shadow:var(--sh3)}
#sb.on{transform:translateX(0)}
.sb-head{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.08);position:relative}
.sb-x{position:absolute;top:16px;right:14px;color:rgba(255,255,255,.55);font-size:18px;cursor:pointer}
.sb-prof{display:flex;align-items:center;gap:11px}
.sb-av{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--g5),var(--g7));display:flex;align-items:center;justify-content:center;font-family:var(--fs);font-size:20px;font-weight:700;color:#fff;border:2px solid rgba(255,255,255,.18)}
.sb-name{font-family:var(--fs);color:#fff;font-size:15px;font-weight:600}
.sb-nav{flex:1;overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:2px}
.nb{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:rgba(255,255,255,.65);font-size:13.5px;transition:.2s;width:100%;text-align:left}
.nb:hover,.nb.act{background:rgba(255,255,255,.1);color:#fff}
#nav{position:fixed;top:0;left:0;right:0;height:var(--nb);background:var(--white);border-bottom:1px solid var(--gr1);display:flex;align-items:center;padding:0 18px;z-index:50;box-shadow:var(--sh1)}
.nav-logo{display:flex;align-items:center;gap:10px;flex:1}
.nav-em{width:36px;height:36px;background:linear-gradient(135deg,var(--g7),var(--g5));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:white}
.nav-txt{font-family:var(--fs);font-size:21px;font-weight:700;color:var(--g8)}
#app{display:flex;flex-direction:column;min-height:100dvh;padding-top:var(--nb)}
#chat{flex:1;overflow-y:auto;padding:28px 18px 185px;display:flex;flex-direction:column;align-items:center}
.ci{width:100%;max-width:760px;display:flex;flex-direction:column;gap:6px}
/* WELCOME STYLES */
#ws{display:flex;flex-direction:column;align-items:center;gap:26px;padding:18px 0 32px;width:100%}
.w-em{width:78px;height:78px;background:linear-gradient(135deg,var(--g7),var(--g5));border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:36px;color:white;box-shadow:0 8px 30px rgba(26,102,64,.25)}
.w-bsm{font-family:var(--fa);font-size:clamp(18px,4vw,24px);color:var(--g7);text-align:center}
/* MESSAGES */
.mrow{display:flex;gap:11px;align-items:flex-start;margin-bottom:15px;width:100%}
.mrow.u{flex-direction:row-reverse}
.mav{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:white}
.mav.ai{background:var(--g7)} .mav.u{background:var(--g8)}
.bub{padding:13px 17px;border-radius:13px;font-size:14.5px;line-height:1.8;max-width:85%}
.bub.u{background:var(--g7);color:white} .bub.ai{background:white;border:1px solid var(--gr1);box-shadow:var(--sh1)}
/* INPUT */
#ibar{position:fixed;bottom:0;left:0;right:0;padding:14px 18px 18px;background:white;z-index:40;display:flex;justify-content:center}
.ii{display:flex;align-items:center;gap:9px;background:var(--white);border:1.5px solid var(--gr2);border-radius:30px;padding:8px 11px 8px 18px;width:100%;max-width:760px;box-shadow:var(--sh2)}
#inp{flex:1;border:none;outline:none;resize:none;font-size:14.5px}
#snd{width:39px;height:39px;border-radius:50%;background:var(--g7);color:white;display:flex;align-items:center;justify-content:center;cursor:pointer}
/* TYPING */
.typ{display:flex;gap:4px;padding:10px}
.td{width:6px;height:6px;background:var(--g4);border-radius:50%;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.rlbl{font-weight:700;color:var(--g7);margin-top:10px;text-transform:uppercase;font-size:12px}
</style>
</head>
<body onload="init()">

<div id="ov" onclick="closeSB()"></div>

<aside id="sb">
  <div class="sb-head">
    <div class="sb-x" onclick="closeSB()">✕</div>
    <div class="sb-prof">
      <div class="sb-av">M</div>
      <div>
        <div class="sb-name">Muslim User</div>
        <div style="color:rgba(255,255,255,0.5);font-size:10px">Hudaa Companion</div>
      </div>
    </div>
  </div>
  <nav class="sb-nav">
    <button class="nb act" onclick="location.reload()">🏠 Home</button>
    <button class="nb" onclick="location.reload()">✏️ New Chat</button>
    <div style="padding:20px; color:rgba(255,255,255,0.2); font-size:11px">Hudaa v2.0 - Powered by Gemini AI</div>
  </nav>
</aside>

<nav id="nav">
  <div class="nav-logo" onclick="toggleSB()">
    <div class="nav-em">☪</div>
    <div><span class="nav-txt">Hudaa</span></div>
  </div>
</nav>

<div id="app">
  <div id="chat">
    <div class="ci" id="ci">
      <div id="ws">
        <div class="w-em">☪</div>
        <div class="w-bsm">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
        <div style="text-align:center; font-family:var(--fs); font-size:28px; font-weight:700;">Welcome to Hudaa</div>
        <p style="text-align:center; max-width:500px; color:var(--t2)">Ask any Islamic question. Answers are based on the Qur'an, Sunnah, and the understanding of the Salaf.</p>
      </div>
    </div>
  </div>

  <div id="ibar">
    <div class="ii">
      <textarea id="inp" rows="1" placeholder="Ask about Deen..."></textarea>
      <div id="snd" onclick="send()">✈</div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════
    STATE & CONFIG (KEY HIDDEN INTERNALLY)
══════════════════════════════════ */
const KEY = 'AIzaSyDUmG-212X_KP7x2Wj32LAY6TTDcRTT-SI'; // Hidden from UI
const MODEL = "gemini-1.5-flash";
const SYSTEM = `You are Hudaa, an Islamic AI. Provide answers strictly from Qur'an, Sahih Hadith, and the Salaf. 
FORMAT: 
**Qur'an:** [Verse]
**Hadith:** [Reference]
**Scholars said:** [View]
**Answer:** [Explanation]`;

let HISTORY = [];

function init() {
    console.log("Hudaa is ready.");
}

function toggleSB() { document.getElementById('sb').classList.toggle('on'); document.getElementById('ov').classList.toggle('on'); }
function closeSB() { document.getElementById('sb').classList.remove('on'); document.getElementById('ov').classList.remove('on'); }

async function send() {
    const input = document.getElementById('inp');
    const text = input.value.trim();
    if(!text) return;

    // Remove welcome
    if(document.getElementById('ws')) document.getElementById('ws').remove();

    addBubble('u', text);
    input.value = '';
    const typ = addTyping();

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${KEY}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                contents: HISTORY.concat([{role: 'user', parts: [{text: text}]}]),
                system_instruction: { parts: [{text: SYSTEM}] }
            })
        });

        const data = await response.json();
        typ.remove();

        if(data.error) {
            addBubble('ai', "❌ Technical error. Please check internet connection.");
            console.error(data.error);
        } else {
            const reply = data.candidates[0].content.parts[0].text;
            addBubble('ai', reply);
            HISTORY.push({role: 'user', parts: [{text: text}]});
            HISTORY.push({role: 'model', parts: [{text: reply}]});
        }
    } catch (e) {
        typ.remove();
        addBubble('ai', "❌ Could not connect to AI server.");
    }
}

function addBubble(role, text) {
    const ci = document.getElementById('ci');
    const row = document.createElement('div');
    row.className = 'mrow ' + role;
    row.innerHTML = `<div class="mav ${role}">${role==='u'?'M':'☪'}</div>
                     <div class="bub ${role}">${formatText(text)}</div>`;
    ci.appendChild(row);
    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function addTyping() {
    const ci = document.getElementById('ci');
    const row = document.createElement('div');
    row.className = 'mrow ai';
    row.innerHTML = `<div class="mav ai">☪</div><div class="typ"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
    ci.appendChild(row);
    return row;
}

function formatText(t) {
    return t.replace(/\*\*(.*?)\*\*/g, '<div class="rlbl">$1</div>')
            .replace(/\n/g, '<br>');
}
</script>
</body>
</html>
