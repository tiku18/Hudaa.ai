<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hudaa - Islamic AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .sidebar { transition: transform 0.3s ease; }
    </style>
</head>
<body class="flex h-screen">

    <!-- Sidebar -->
    <div id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r transform -translate-x-full lg:translate-x-0 sidebar">
        <div class="p-6 border-b">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-emerald-600 flex items-center justify-center text-white">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <p class="font-bold text-sm">User Profile</p>
                    <p class="text-xs text-gray-500 italic">Hudaa Assistant</p>
                </div>
            </div>
        </div>
        <nav class="p-4 space-y-2">
            <a href="#" class="block p-3 rounded-lg bg-emerald-50 text-emerald-700"><i class="fas fa-home mr-2"></i> Home</a>
            <a href="#" class="block p-3 rounded-lg hover:bg-gray-100"><i class="fas fa-plus mr-2"></i> New Chat</a>
            <a href="#" class="block p-3 rounded-lg hover:bg-gray-100"><i class="fas fa-bookmark mr-2"></i> Saved</a>
        </nav>
        <div class="absolute bottom-0 w-full p-4 border-t bg-gray-50">
            <div class="flex space-x-4 mb-2 text-emerald-700">
                <a href="https://www.instagram.com/the.salafiyahh"><i class="fab fa-instagram"></i></a>
                <a href="https://x.com/haqqalfurqan"><i class="fab fa-twitter"></i></a>
                <a href="mailto:haqqalfurqan@gmail.com"><i class="fas fa-envelope"></i></a>
            </div>
            <p class="text-[10px] text-gray-400">Hudaa is an AI and can make mistakes.</p>
            <p class="text-[10px] text-gray-400">© 2026 The Salafiyahh</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col lg:ml-64">
        <header class="h-16 border-b bg-white flex items-center px-6 justify-between">
            <button onclick="toggleSidebar()" class="lg:hidden text-emerald-700"><i class="fas fa-bars"></i></button>
            <h1 class="text-xl font-bold text-emerald-800">Hudaa</h1>
            <div></div>
        </header>

        <main class="flex-1 overflow-y-auto p-6 flex flex-col items-center justify-center text-center">
            <h2 class="text-3xl font-bold text-emerald-900 mb-4">Assalamu Alaikum</h2>
            <p class="text-gray-600 max-w-md italic">Searching from the Qur’an, Sunnah, and the path of the Salaf al-Salih.</p>
        </main>

        <footer class="p-6 bg-white border-t">
            <div class="max-w-3xl mx-auto flex">
                <input type="text" placeholder="Ask an Islamic question..." class="flex-1 p-3 border rounded-l-lg focus:outline-none focus:ring-1 focus:ring-emerald-500">
                <button class="bg-emerald-600 text-white px-6 rounded-r-lg">Send</button>
            </div>
        </footer>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }
    </script>
</body>
</html>
